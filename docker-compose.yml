version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      # CRITICAL: Maps the container's data folder to your local laptop
      # This ensures your audit_log.csv survives container restarts
      - ./backend/data:/app/data
    environment:
      - ENV=development
  
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend